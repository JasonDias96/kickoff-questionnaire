<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>KickOff — Join the Waitlist</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: hsl(240, 10%, 3.9%); color: hsl(0, 0%, 98%); min-height: 100vh; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
.container { max-width: 440px; margin: 0 auto; padding: 16px; min-height: 100vh; display: flex; flex-direction: column; gap: 16px; align-items: center; }

/* Logo / Header */
.logo { text-align: center; padding: 24px 0 4px; }
.logo img { width: 180px; height: auto; }
.logo p { font-size: 13px; color: hsl(240, 5%, 64.9%); margin-top: 10px; font-weight: 400; }

/* Content shell — matches the app's Content component */
.card {
  width: calc(100% + 32px);
  margin-left: -16px;
  margin-right: -16px;
  background: #0F170B;
  border-radius: 40px;
  border: 1px solid #416244;
  padding: 32px 24px;
  flex-grow: 1;
  position: relative;
  overflow: hidden;
}

/* Step dots */
.step-dots { display: flex; justify-content: center; gap: 8px; margin-bottom: 24px; }
.sd { width: 8px; height: 8px; border-radius: 50%; background: #1e2a1a; border: 1px solid #416244; transition: all 0.3s; }
.sd.active { background: #4bff60; border-color: #4bff60; box-shadow: 0 0 8px rgba(75, 255, 96, 0.3); }

/* Question text */
.q-label { font-size: 17px; font-weight: 700; margin-bottom: 4px; color: hsl(0, 0%, 98%); }
.q-sub { font-size: 13px; color: hsl(240, 5%, 64.9%); margin-bottom: 20px; line-height: 1.5; }

/* Input fields */
.field-label { font-size: 11px; font-weight: 700; color: hsl(240, 5%, 64.9%); margin-bottom: 6px; display: block; text-transform: uppercase; letter-spacing: 0.5px; }
.field-input {
  width: 100%;
  padding: 14px 16px;
  border: 1px solid #416244;
  border-radius: 12px;
  font-size: 16px;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
  font-family: 'Inter', inherit;
  margin-bottom: 12px;
  background: #0F170B;
  color: hsl(0, 0%, 98%);
}
.field-input:focus { border-color: #4bff60; box-shadow: 0 0 0 2px rgba(75, 255, 96, 0.15); }
.field-input::placeholder { color: hsl(240, 5%, 35%); }
.field-input.error { border-color: #FF4444; box-shadow: 0 0 0 2px rgba(255, 68, 68, 0.15); }
.field-hint { font-size: 11px; color: hsl(240, 5%, 50%); margin-top: -8px; margin-bottom: 12px; }

/* Option cards */
.opt {
  border: 1px solid #416244;
  border-radius: 14px;
  padding: 14px 16px;
  margin-bottom: 10px;
  cursor: pointer;
  transition: all 0.2s;
  -webkit-tap-highlight-color: transparent;
  background: #152713;
}
.opt:hover { border-color: #5a8a5e; background: #1a3118; }
.opt:active { transform: scale(0.98); }
.opt.sel { border-color: #4bff60; background: rgba(75, 255, 96, 0.08); }
.opt-title { font-size: 15px; font-weight: 600; margin-bottom: 3px; display: flex; align-items: center; gap: 10px; color: hsl(0, 0%, 90%); }
.opt-desc { font-size: 12px; color: hsl(240, 5%, 55%); line-height: 1.5; padding-left: 28px; }
.opt.sel .opt-title { color: #4bff60; }
.opt.sel .opt-desc { color: hsl(240, 5%, 64.9%); }

/* Radio dot */
.dot { width: 18px; height: 18px; border-radius: 50%; border: 1.5px solid #416244; flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
.dot.on { border-color: #4bff60; background: #4bff60; }
.dot.on::after { content: ''; width: 6px; height: 6px; border-radius: 50%; background: #0F170B; }

/* Buttons */
.btn { display: block; width: 100%; padding: 15px; border-radius: 12px; font-size: 16px; font-weight: 600; border: none; cursor: pointer; text-align: center; font-family: 'Inter', inherit; transition: all 0.2s; -webkit-tap-highlight-color: transparent; }
.btn:active { transform: scale(0.98); }
.btn-primary {
  background: #152713;
  color: hsl(0, 0%, 98%);
  margin-top: 16px;
  border: 1px solid #416244;
}
.btn-primary:hover { background: #1a3118; border-color: #4bff60; }
.btn-primary:disabled { opacity: 0.3; cursor: default; transform: none; }
.btn-back { background: transparent; color: hsl(240, 5%, 55%); margin-top: 8px; font-size: 14px; }
.btn-back:hover { color: hsl(240, 5%, 75%); }
.btn-submit {
  background: #4bff60;
  color: #0F170B;
  margin-top: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  font-size: 16px;
  font-weight: 700;
  border: none;
}
.btn-submit:hover { background: #3de050; }
.btn-submit:disabled { opacity: 0.4; cursor: default; transform: none; }
.btn-submitting { background: #416244; color: hsl(0, 0%, 70%); }

/* Hint / Warning box */
.hint { background: rgba(75, 255, 96, 0.06); border: 1px solid rgba(75, 255, 96, 0.15); border-radius: 12px; padding: 12px 14px; margin-bottom: 16px; display: flex; gap: 10px; align-items: flex-start; }
.hint-icon { font-size: 18px; flex-shrink: 0; }
.hint p { font-size: 12px; color: hsl(240, 5%, 64.9%); line-height: 1.5; }

/* Once notice */
.once-notice { background: rgba(75, 255, 96, 0.06); border: 1px solid rgba(75, 255, 96, 0.12); border-radius: 12px; padding: 12px 14px; margin-bottom: 18px; }
.once-notice p { font-size: 12px; color: hsl(240, 5%, 64.9%); line-height: 1.5; text-align: center; }

/* Result card */
.result-card { text-align: center; padding: 24px 0; }
.result-name { font-size: 13px; color: hsl(240, 5%, 55%); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 1px; font-weight: 600; }
.result-ovr { font-size: 72px; font-weight: 800; color: hsl(0, 0%, 98%); line-height: 1; }
.result-tier { font-size: 15px; color: #4bff60; font-weight: 700; margin-top: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
.result-details { margin-top: 24px; padding-top: 16px; border-top: 1px solid #416244; text-align: left; }
.result-row { display: flex; justify-content: space-between; padding: 8px 0; font-size: 13px; }
.result-row .label { color: hsl(240, 5%, 55%); font-weight: 500; }
.result-row .value { font-weight: 600; text-align: right; max-width: 60%; color: hsl(0, 0%, 90%); }
.result-note { font-size: 12px; color: hsl(240, 5%, 50%); text-align: center; margin-top: 16px; line-height: 1.6; }

/* Done message */
.done-msg { text-align: center; margin-top: 20px; padding-top: 16px; border-top: 1px solid #416244; }
.done-msg p { font-size: 13px; color: #4bff60; font-weight: 600; }
.done-msg .sub { font-size: 12px; color: hsl(240, 5%, 55%); font-weight: 400; margin-top: 4px; }

/* Waitlist confirmation */
.waitlist-card { text-align: center; padding: 32px 0; }
.waitlist-emoji { font-size: 48px; margin-bottom: 16px; }
.waitlist-title { font-size: 22px; font-weight: 800; color: hsl(0, 0%, 98%); margin-bottom: 4px; }
.waitlist-ovr { font-size: 14px; color: #4bff60; font-weight: 700; margin-bottom: 24px; text-transform: uppercase; letter-spacing: 0.5px; }
.waitlist-msg { font-size: 13px; color: hsl(240, 5%, 64.9%); line-height: 1.7; }
.waitlist-msg strong { color: #4bff60; font-weight: 700; }
.waitlist-username { font-size: 13px; color: hsl(240, 5%, 64.9%); font-weight: 500; margin-top: 20px; padding-top: 20px; border-top: 1px solid #416244; }
.waitlist-username strong { color: #4bff60; }

/* Stat card row on result page */
.stat-row { display: flex; gap: 8px; margin-top: 16px; }
.stat-card {
  flex: 1;
  background: #152713;
  border: 1px solid #416244;
  border-radius: 12px;
  padding: 12px 8px;
  text-align: center;
}
.stat-card .stat-val { font-size: 22px; font-weight: 800; color: hsl(0, 0%, 98%); }
.stat-card .stat-label { font-size: 10px; font-weight: 700; color: hsl(240, 5%, 55%); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 2px; }
</style>
</head>
<body>
<div class="container">
<div class="logo">
<img src="header-logo.png" alt="KickOff">
<p>Join the waitlist and find your starting rating</p>
</div>
<div class="card" id="app"></div>
</div>

<script>
const q1opts = [
  {id:"new",title:"I'm new to football",desc:"You're just getting started or you've only played a handful of times. Everyone starts somewhere — this is your somewhere."},
  {id:"casual",title:"I play casually with mates",desc:"Park kickabouts, the odd 5-a-side with friends. No league, no drama — just a good time."},
  {id:"cleague",title:"I play in a casual league",desc:"Work league, social 5/6/7-a-side, or a regular weekly game. You've probably got a team group chat that's 90% banter."},
  {id:"comp",title:"I play in a competitive league",desc:"Sunday league, competitive 11-a-side, or a proper league where the table actually matters to people."},
  {id:"semipro",title:"Semi-pro or above",desc:"You've played at a level most people only watch. Academy, semi-pro, professional — the real deal."}
];

const branches = {
  "new":{label:"How would you describe your ability right now?",sub:"No wrong answers here — this just helps us find your starting point",opts:[
    {title:"Completely brand new",desc:"You're still getting used to how the ball moves. Passing and shooting feel unpredictable, and that's totally fine — you'll improve fast.",seed:950},
    {title:"Getting the hang of it",desc:"You can kick the ball and it goes roughly the right direction. Your touch isn't consistent yet but you're getting there.",seed:1025},
    {title:"Athletic, just new to football",desc:"You're fit and active from other sports — football is just the latest addition. You tend to pick things up quickly.",seed:1100}
  ]},
  "casual":{label:"When you play with your mates, where do you fit in?",sub:"Think about a typical game — we all have good days and bad days",opts:[
    {title:"I'm still finding my feet",desc:"You love playing but fitness or confidence can be a challenge. You're there for the fun and that's what matters.",seed:1075},
    {title:"I hold my own",desc:"You can last most of the game, your passing is decent, and you feel comfortable on the pitch. A reliable pick.",seed:1150},
    {title:"I'm usually one of the better ones",desc:"You get picked early, you can control the game a bit, and you chip in with goals or assists fairly regularly.",seed:1225}
  ]},
  "cleague":{label:"How do you compare to others in your league?",sub:"Think about a normal week — not your best performance, not your worst",opts:[
    {title:"I'm still developing at this level",desc:"The pace can feel a bit fast sometimes and you're still growing into the standard. Every game you're learning though.",seed:1175},
    {title:"I'm a solid mid-table player",desc:"You do your job well, you're reliable, and you can comfortably play the full game without any issues.",seed:1250},
    {title:"I'm one of the best in my league",desc:"You're a key player for your team. People notice when you play well — and when you're not there.",seed:1325}
  ]},
  "comp":{label:"What level of competitive football?",sub:"Where you're playing regularly right now",opts:[
    {title:"Standard Sunday league",desc:"Regular 11-a-side weekend league with a proper ref, proper goals, and a league table. Good standard, proper football.",seed:1350},
    {title:"High-level amateur",desc:"Top-tier Sunday league, county cups, FA Vase qualifying rounds. A clear step up from your average local league.",seed:1450}
  ]},
  "semipro":{label:"What level have you played at?",sub:"The highest level you competed at regularly — not a one-off trial or friendly",warn:true,opts:[
    {title:"County or regional level",desc:"County cups, regional leagues, strong university 1st team, or serious representative football. A level above club football.",seed:1450},
    {title:"Academy or semi-pro",desc:"Professional club academy, National League System (step 5-7), or you were paid to play part-time. Proper pedigree.",seed:1650},
    {title:"Professional",desc:"Full-time professional contract — EFL, Scottish Premiership, or equivalent abroad. You had a squad number and a locker.",seed:1900},
    {title:"Top-flight or international",desc:"Premier League, Championship, top European leagues, or senior international caps. You already know where you belong.",seed:2150}
  ]}
};

const q2opts = [
  {title:"Rarely",desc:"A few times a year at most. Your boots might need dusting off but that's alright — they'll warm up.",adj:-50},
  {title:"Once or twice a month",desc:"You play when life allows it. Not every week, but enough to keep the rust off.",adj:0},
  {title:"About once a week",desc:"You've got a regular weekly game or session. Football is a proper part of your week.",adj:25},
  {title:"Multiple times a week",desc:"Training, matches, or kickabouts 2+ times a week. Football is a big part of your routine and you love it.",adj:50}
];

let step="name",playerName="",playerEmail="",playerUsername="",q1sel=-1,brSel=-1,q2sel=-1,submitted=false,submittedOvr=0;

function toOVR(v){return Math.max(60,Math.min(99,Math.round(60+(v-800)*39.0/1400.0)))}
function getSeed(){
  if(q1sel<0||brSel<0)return 1175;
  return branches[q1opts[q1sel].id].opts[brSel].seed;
}
function isValidEmail(e){return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(e)}
function isValidUsername(u){return /^[a-z0-9_]{3,20}$/.test(u)}

function dots(a,t){
  let h='<div class="step-dots">';
  for(let i=0;i<t;i++)h+='<div class="sd'+(i<a?' active':'')+'"></div>';
  return h+'</div>';
}

function optHTML(opts,si,fn){
  let h='';
  opts.forEach((o,i)=>{
    const s=i===si;
    h+='<div class="opt'+(s?' sel':'')+'" onclick="'+fn+'('+i+')">';
    h+='<p class="opt-title"><span class="dot'+(s?' on':'')+'"></span>'+o.title+'</p>';
    h+='<p class="opt-desc">'+o.desc+'</p></div>';
  });
  return h;
}

function render(){
  const app=document.getElementById("app");
  let h='';

  if(submitted){
    h+='<div class="waitlist-card">';
    h+='<div class="waitlist-emoji">&#127941;</div>';
    h+='<p class="waitlist-title">Welcome to the waitlist!</p>';
    h+='<p class="waitlist-ovr">Your starting OVR: '+submittedOvr+'</p>';
    h+='<p class="waitlist-msg">You\'re on the list, '+playerName.split(" ")[0]+'. When KickOff launches, we\'ll send you an email so you can download the app. Your starting rating of <strong>'+submittedOvr+'</strong> will be waiting for you — ready to go from your very first match.</p>';
    if(playerUsername){
      h+='<p class="waitlist-username">Your username: <strong>@'+playerUsername+'</strong></p>';
    }
    h+='</div>';
    app.innerHTML=h;
    return;
  }

  if(step==="name"){
    h+=dots(1,5);
    h+='<p class="q-label">Let\'s get you set up</p>';
    h+='<p class="q-sub">We\'ll use this to create your account when the app launches</p>';
    h+='<div class="once-notice"><p>You can only do this once — go with your gut on the questions. Your real matches will adjust your rating quickly anyway.</p></div>';

    h+='<label class="field-label">Your name</label>';
    h+='<input class="field-input" type="text" placeholder="e.g. Jason Dias" id="nameInput" value="'+playerName+'" autocomplete="name" autocapitalize="words">';

    h+='<label class="field-label">Email address</label>';
    h+='<input class="field-input" type="email" placeholder="e.g. jason@email.com" id="emailInput" value="'+playerEmail+'" autocomplete="email">';
    h+='<p class="field-hint">We\'ll notify you when the app is ready to download</p>';

    h+='<label class="field-label">Preferred username</label>';
    h+='<input class="field-input" type="text" placeholder="e.g. jasondias96" id="usernameInput" value="'+playerUsername+'" autocomplete="off" autocapitalize="none" autocorrect="off" spellcheck="false">';
    h+='<p class="field-hint">Lowercase letters, numbers, and underscores only (3–20 characters)</p>';

    h+='<p id="nameError" style="font-size:12px;color:#FF4444;margin-top:4px;display:none;"></p>';
    h+='<button class="btn btn-primary" onclick="goToQ1()" id="nameBtn">Let\'s go</button>';
  }
  else if(step==="q1"){
    h+=dots(2,5);
    h+='<p class="q-label">What best describes your football experience?</p>';
    h+='<p class="q-sub">Pick the one that fits you right now — not where you used to be</p>';
    h+=optHTML(q1opts,q1sel,"pickQ1");
    h+='<button class="btn btn-primary"'+(q1sel<0?' disabled':'')+' onclick="goToBranch()">Next</button>';
    h+='<button class="btn btn-back" onclick="goBack(\'name\')">Back</button>';
  }
  else if(step==="branch"){
    h+=dots(3,5);
    const br=branches[q1opts[q1sel].id];
    h+='<p class="q-label">'+br.label+'</p>';
    h+='<p class="q-sub">'+br.sub+'</p>';
    if(br.warn){
      h+='<div class="hint"><span class="hint-icon">&#9432;</span><p>Just a heads up — your rating updates after every match based on how you actually play. There\'s no benefit to picking a level higher than where you really are. Be honest and the system will do the rest.</p></div>';
    }
    h+=optHTML(br.opts,brSel,"pickBr");
    h+='<button class="btn btn-primary"'+(brSel<0?' disabled':'')+' onclick="goToQ2()">Next</button>';
    h+='<button class="btn btn-back" onclick="goBack(\'q1\')">Back</button>';
  }
  else if(step==="q2"){
    h+=dots(4,5);
    h+='<p class="q-label">How often do you play?</p>';
    h+='<p class="q-sub">Include everything — matches, training, park kickabouts, all of it</p>';
    h+=optHTML(q2opts,q2sel,"pickQ2");
    h+='<button class="btn btn-primary"'+(q2sel<0?' disabled':'')+' onclick="goToResult()">See my starting rating</button>';
    h+='<button class="btn btn-back" onclick="goBack(\'branch\')">Back</button>';
  }
  else if(step==="result"){
    h+=dots(5,5);
    const seed=getSeed();
    const internal=seed+q2opts[q2sel].adj;
    const ovr=toOVR(internal);
    let tier="";
    if(ovr<=65)tier="Beginner";
    else if(ovr<=68)tier="Developing";
    else if(ovr<=71)tier="Casual";
    else if(ovr<=74)tier="Regular";
    else if(ovr<=78)tier="Competitive";
    else if(ovr<=84)tier="Advanced";
    else if(ovr<=92)tier="Semi-pro";
    else tier="Professional";

    const q1text=q1opts[q1sel].title;
    const brText=branches[q1opts[q1sel].id].opts[brSel].title;
    const q2text=q2opts[q2sel].title;

    h+='<div class="result-card">';
    h+='<p class="result-name">'+playerName+'</p>';
    h+='<p class="result-ovr">'+ovr+'</p>';
    h+='<p class="result-tier">'+tier+'</p>';

    h+='<div class="stat-row">';
    h+='<div class="stat-card"><div class="stat-val">'+ovr+'</div><div class="stat-label">OVR</div></div>';
    h+='<div class="stat-card"><div class="stat-val" style="font-size:14px;">'+tier+'</div><div class="stat-label">Tier</div></div>';
    h+='<div class="stat-card"><div class="stat-val" style="font-size:14px;">'+q2text.split(" ")[0]+'</div><div class="stat-label">Frequency</div></div>';
    h+='</div>';

    h+='<div class="result-details">';
    h+='<div class="result-row"><span class="label">Experience</span><span class="value">'+q1text+'</span></div>';
    h+='<div class="result-row"><span class="label">Level</span><span class="value">'+brText+'</span></div>';
    h+='<div class="result-row"><span class="label">Frequency</span><span class="value">'+q2text+'</span></div>';
    h+='</div>';
    h+='<p class="result-note">This is your starting point. The more games you play on KickOff, the more accurate your rating becomes.</p>';

    h+='<button class="btn btn-submit" id="submitBtn" onclick="submitResult()">Join the waitlist</button>';
    h+='<p id="submitError" style="font-size:12px;color:#FF4444;text-align:center;margin-top:8px;display:none;"></p>';

    h+='<div class="done-msg">';
    h+='<p>We\'ll email you when KickOff launches</p>';
    h+='<p class="sub">Your starting OVR will be ready from day one</p>';
    h+='</div>';
    h+='</div>';
  }
  app.innerHTML=h;

  if(step==="name"){
    const nameInp=document.getElementById("nameInput");
    const emailInp=document.getElementById("emailInput");
    const usernameInp=document.getElementById("usernameInput");
    const btn=document.getElementById("nameBtn");
    const errEl=document.getElementById("nameError");

    function syncValues(){
      playerName=nameInp.value;
      playerEmail=emailInp.value;
      playerUsername=usernameInp.value.toLowerCase().replace(/[^a-z0-9_]/g,"");
      usernameInp.value=playerUsername;
      btn.disabled=!(playerName.trim()&&playerEmail.trim()&&playerUsername.trim());
      errEl.style.display="none";
    }

    if(nameInp){
      nameInp.addEventListener("input",syncValues);
      emailInp.addEventListener("input",syncValues);
      usernameInp.addEventListener("input",syncValues);
      btn.disabled=!(playerName.trim()&&playerEmail.trim()&&playerUsername.trim());
      setTimeout(()=>nameInp.focus(),100);
    }
  }
}

function pickQ1(i){q1sel=i;brSel=-1;render()}
function pickBr(i){brSel=i;render()}
function pickQ2(i){q2sel=i;render()}

function goToQ1(){
  if(!playerName.trim()||!playerEmail.trim()||!playerUsername.trim())return;
  const errEl=document.getElementById("nameError");
  if(!isValidEmail(playerEmail)){
    errEl.textContent="Please enter a valid email address";
    errEl.style.display="block";
    document.getElementById("emailInput").classList.add("error");
    return;
  }
  if(!isValidUsername(playerUsername)){
    errEl.textContent="Username must be 3–20 characters: lowercase letters, numbers, or underscores";
    errEl.style.display="block";
    document.getElementById("usernameInput").classList.add("error");
    return;
  }
  step="q1";render();
}

function goToBranch(){step="branch";brSel=-1;render()}
function goToQ2(){step="q2";render()}
function goToResult(){step="result";render()}
function goBack(s){step=s;if(s==="q1")brSel=-1;render()}

const SUPABASE_URL="https://gasaitelsorrofjajnfj.supabase.co";
const SUPABASE_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdhc2FpdGVsc29ycm9mamFqbmZqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgxODQ5MTgsImV4cCI6MjA5Mzc2MDkxOH0.j6YUdEGsqmUBvyZYEDD0pvc56nyeOUZWcR2q0yg8RUM";

function submitResult(){
  const btn=document.getElementById("submitBtn");
  const errEl=document.getElementById("submitError");
  if(!btn||btn.disabled)return;
  btn.disabled=true;
  btn.textContent="Joining...";
  btn.classList.add("btn-submitting");
  errEl.style.display="none";

  const seed=getSeed();
  const internal=seed+q2opts[q2sel].adj;
  const ovr=toOVR(internal);
  let tier="";
  if(ovr<=65)tier="Beginner";
  else if(ovr<=68)tier="Developing";
  else if(ovr<=71)tier="Casual";
  else if(ovr<=74)tier="Regular";
  else if(ovr<=78)tier="Competitive";
  else if(ovr<=84)tier="Advanced";
  else if(ovr<=92)tier="Semi-pro";
  else tier="Professional";

  const body={
    name:playerName,
    email:playerEmail.toLowerCase().trim(),
    preferred_username:playerUsername,
    experience:q1opts[q1sel].title,
    level:branches[q1opts[q1sel].id].opts[brSel].title,
    frequency:q2opts[q2sel].title,
    seed:internal,
    ovr:ovr,
    tier:tier
  };

  fetch(SUPABASE_URL+"/rest/v1/questionnaire_responses",{
    method:"POST",
    headers:{
      "apikey":SUPABASE_KEY,
      "Authorization":"Bearer "+SUPABASE_KEY,
      "Content-Type":"application/json",
      "Prefer":"return=minimal"
    },
    body:JSON.stringify(body)
  }).then(function(r){
    if(r.ok){
      submitted=true;
      submittedOvr=ovr;
      render();
    } else if(r.status===409){
      throw new Error("duplicate");
    } else {
      throw new Error("Failed: "+r.status);
    }
  }).catch(function(e){
    btn.disabled=false;
    btn.textContent="Join the waitlist";
    btn.classList.remove("btn-submitting");
    if(e.message==="duplicate"){
      errEl.textContent="This email is already on the waitlist!";
    } else {
      errEl.textContent="Something went wrong — try again";
    }
    errEl.style.display="block";
  });
}

render();
</script>
</body>
</html>
